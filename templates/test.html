<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Test - {{ material.title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .test-container { max-width: 800px; margin: auto; }
        .question-card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .option-label { display: block; padding: 10px 15px; border: 1px solid #dee2e6; border-radius: 8px; margin-bottom: 8px; cursor: pointer; transition: 0.2s; }
        .option-label:hover { background-color: #e9ecef; }
        input[type="radio"]:checked + span { font-weight: bold; color: #0d6efd; }
    </style>
</head>
<body class="py-5">

<div class="container test-container">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h2>{{ material.title }} Quiz</h2>
        <span class="badge bg-primary">Unit {{ material.unit }}</span>
    </div>

    <form method="post">
        {% for q in questions %}
        <div class="question-card">
            <h5 class="mb-3">{{ loop.index }}. {{ q.text }}</h5>
            
            <div class="options">
                <label class="option-label">
                    <input type="radio" name="{{ q.id }}" value="A" class="me-2" required>
                    <span>{{ q.option_a }}</span>
                </label>
                
                <label class="option-label">
                    <input type="radio" name="{{ q.id }}" value="B" class="me-2">
                    <span>{{ q.option_b }}</span>
                </label>
                
                <label class="option-label">
                    <input type="radio" name="{{ q.id }}" value="C" class="me-2">
                    <span>{{ q.option_c }}</span>
                </label>
                
                <label class="option-label">
                    <input type="radio" name="{{ q.id }}" value="D" class="me-2">
                    <span>{{ q.option_d }}</span>
                </label>
            </div>
        </div>
        {% endfor %}

        <div class="text-center mt-4">
            <button type="submit" class="btn btn-primary btn-lg px-5 shadow">Submit Test</button>
        </div>
    </form>
</div>

</body>
</html>
