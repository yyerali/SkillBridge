<!DOCTYPE html>
<html>
<head>
    <title>Result</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="text-center p-5">

<h2>Result</h2>

<h1>{{ percent }}%</h1>

{% if percent >= 60 %}
    <p style="color:green;">Passed ✅</p>
{% else %}
    <p style="color:red;">Failed ❌</p>
{% endif %}

<a href="/dashboard">Back</a>
</body>
</html>
